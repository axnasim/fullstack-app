backend:
  image:
    repository: fullstack-app-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 3000
  env:
    PG_HOST: postgres
    PG_PORT: "5432"
    PG_DB: appdb
    PG_USER: postgres
    REDIS_URL: redis://redis:6379
    CORS_ORIGIN: "*"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

frontend:
  image:
    repository: fullstack-app-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  image: postgres:16-alpine
  port: 5432
  database: appdb
  user: postgres
  password: postgres
  storage: 1Gi

redis:
  image: redis:7-alpine
  port: 6379
  storage: 256Mi
